<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kentucky Weather Alert Ticker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #000;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    #ticker-container {
        position: fixed;
        bottom: 0;
        width: 100%;
        background: #900;
        color: #fff;
        padding: 10px 0;
        font-size: 20px;
        white-space: nowrap;
        overflow: hidden;
        border-top: 2px solid #600;
    }

    #ticker {
        display: inline-block;
        padding-left: 100%;
        animation: scroll 40s linear infinite;
    }

    @keyframes scroll {
        from { transform: translateX(0); }
        to { transform: translateX(-100%); }
    }
</style>
</head>

<body>

<div id="ticker-container">
    <div id="ticker">Loading Kentucky weather alerts…</div>
</div>

<script>
async function loadAlerts() {
    const url = "https://api.weather.gov/alerts/active?area=KY";

    try {
        const res = await fetch(url, {
            headers: {
                "User-Agent": "DTVHubDashboard (dtvhub.github.io)"
            }
        });

        const data = await res.json();
        const alerts = data.features;

        if (!alerts.length) {
            document.getElementById("ticker").textContent =
                "No active watches or warnings for Kentucky.";
            return;
        }

        const messages = alerts.map(a => {
            const p = a.properties;

            const event = p.event;
            const area = p.areaDesc;
            const expires = new Date(p.expires).toLocaleTimeString("en-US", {
                hour: "numeric",
                minute: "2-digit",
                timeZone: "America/New_York"
            });

            return `${event} for ${area} until ${expires} ET`;
        });

        // Join with separators
        const tickerText = messages.join("   •   ");

        // Update ticker
        const ticker = document.getElementById("ticker");
        ticker.textContent = tickerText;

        // Restart animation cleanly
        ticker.style.animation = "none";
        void ticker.offsetWidth; // force reflow
        ticker.style.animation = "";
        ticker.style.animation = "scroll 40s linear infinite";

    } catch (err) {
        document.getElementById("ticker").textContent =
            "Error loading alerts.";
    }
}

// Initial load
loadAlerts();

// Refresh every 60 seconds
setInterval(loadAlerts, 60000);
</script>

</body>
</html>
