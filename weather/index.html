<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: white;
        height: 100vh;
        display: grid;
        grid-template-rows: 60px 1fr 1fr;
        gap: 6px;
    }

    .row {
        display: grid;
        gap: 6px;
    }

    .panel {
        background: #000;
        border: 2px solid #222;
        position: relative;
        overflow: hidden;
    }

    .panel iframe, .panel video {
        width: 100%;
        height: 100%;
        border: none;
        object-fit: contain;
        background: #000;
    }

    .label {
        position: absolute;
        top: 6px;
        left: 6px;
        background: rgba(0,0,0,0.6);
        padding: 4px 8px;
        font-size: 14px;
        border-radius: 4px;
    }

    .fullscreen-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        background: rgba(0,0,0,0.6);
        padding: 4px 8px;
        font-size: 14px;
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
// Load HLS streams
function loadStream(id, url) {
    const video = document.getElementById(id);

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
    }
}

// Fullscreen handler
function goFullscreen(elementId) {
    const el = document.getElementById(elementId);
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
}
</script>
</head>

<body>

<!-- 🔴 WEATHER ALERT TICKER PANEL -->
<div class="panel" id="tickerPanel">
    <div class="label">Kentucky Weather Alerts</div>
    <div class="fullscreen-btn" onclick="goFullscreen('tickerPanel')">⛶</div>
    <iframe src="https://dtvhub.github.io/Dashboards/weather/kyalertsticker.html"></iframe>
</div>

<!-- NOAA RADAR + WEATHER CHANNEL -->
<div class="row" style="grid-template-columns: 1fr 1fr;">

    <!-- NOAA Radar -->
    <div class="panel" id="radarPanel">
        <div class="label">Map</div>
        <div class="fullscreen-btn" onclick="goFullscreen('radarPanel')">⛶</div>
        <iframe src="https://dtvhub.github.io/Dashboards/weather/weather-alerts.html" frameborder="0"></iframe>
    </div>

    <!-- Weather Channel -->
    <div class="panel" id="weatherPanel">
        <div class="label">Weather Channel</div>
        <div class="fullscreen-btn" onclick="goFullscreen('weatherPanel')">⛶</div>
        <video id="weather" muted controls></video>
    </div>

</div>
<script>
loadStream(
    "weather",
    "https://twcprod-live.twc-tv.com/v1/manifest/b4d4d63a49309cc5140171fb2e92485c31be1e9e/DSP_6228e4760505741a116f1ba2_twcprod-live/6bf09ce5-366b-463c-b67e-c4b799f73c3f/4.m3u8"
);
</script>

</body>
</html>
