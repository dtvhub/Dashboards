<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #111;
        font-family: Arial, sans-serif;
        color: white;
        overflow: hidden;
    }

    /* GRID LAYOUT */
    .layout {
        display: grid;
        grid-template-rows: 60px 1fr; /* ticker row + main grid */
        height: 100vh;
    }

    /* TICKER PANEL (FULL WIDTH) */
    .ticker-panel {
        border-bottom: 2px solid #333;
        position: relative;
        overflow: hidden;
    }

    .ticker-title {
        position: absolute;
        top: 5px;
        left: 5px;
        background: rgba(0,0,0,0.6);
        padding: 4px 8px;
        font-size: 16px;
        border-radius: 4px;
        z-index: 10;
    }

    /* MAIN 2x2 GRID */
    .grid-2x2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
    }

    .panel {
        border: 1px solid #333;
        position: relative;
        overflow: hidden;
    }

    .panel-title {
        position: absolute;
        top: 5px;
        left: 5px;
        background: rgba(0,0,0,0.6);
        padding: 4px 8px;
        font-size: 16px;
        border-radius: 4px;
        z-index: 10;
    }

    iframe, video {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>

<body>

<div class="layout">

    <!-- FULL-WIDTH KY ALERTS TICKER PANEL -->
    <div class="ticker-panel">
        <div class="ticker-title">KY Alerts Ticker</div>
        <iframe 
            src="https://dtvhub.github.io/Dashboards/weather/kyalertsticker.html"
            style="width: 100%; height: 100%; border: none;"
        ></iframe>
    </div>

    <!-- 2x2 WEATHER GRID -->
    <div class="grid-2x2">

        <!-- WEATHER STREAM -->
        <div class="panel">
            <div class="panel-title">Weather</div>
            <video autoplay muted playsinline>
                <source src="https://wx.tegnaone.com/whas/v1/index_2.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <!-- WEATHER CHANNEL -->
        <div class="panel">
            <div class="panel-title">Weather Channel</div>
            <video autoplay muted playsinline>
                <source src="https://twcprod-live.twc-tv.com/v1/manifest/b4d4d63a49309cc5140171fb2e92485c31be19e/DSP_6228e4760505741a116f1ba2_twcprod-live/6bf09ce5-366b-463c-b67e-c4b799f3cf3f/4.m3u8" type="application/x-mpegURL">
            </video>
        </div>

        <!-- NOAA RADAR -->
        <div class="panel">
            <div class="panel-title">NOAA Radar</div>
            <iframe src="https://radar.weather.gov/?settings=v1_eyJhbmltYXRpbmciOnRydWUsImNlbnRlciI6Wy04NC4zLDM2LjFdLCJsb2NhdGlvbiI6Wy04NC4zLDM2LjFdLCJsb2NhdGlvblR5cGUiOiJzdGF0aW9uIiwic3RhdGlvbiI6IktFWCIsInpvb20iOjYsIm92ZXJsYXkiOiJyYWRhciIsImxheWVycyI6WyJjb3VudHkiLCJzdGF0ZSIsInJpdmVycyIsImZvcmVjYXN0cyIsIm1ldGFkYXRhIl19"></iframe>
        </div>

        <!-- WEATHER ALERTS MAP -->
        <div class="panel">
            <div class="panel-title">Weather Alerts Map</div>
            <iframe src="https://dtvhub.github.io/Dashboards/weather/weather-alerts.html"></iframe>
        </div>

    </div>

</div>

</body>
</html>
