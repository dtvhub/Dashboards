<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Alerts Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
    body {
        margin: 0;
        height: 100vh;
        background: #000;
    }
    #map {
        width: 100%;
        height: 100%;
    }
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// NWS Standard Colors
const alertColors = {
    "Tornado Warning": "#ff0000",
    "Severe Thunderstorm Warning": "#ffcc00",
    "Flash Flood Warning": "#00ff00",
    "Flood Warning": "#00aa00",
    "High Wind Warning": "#ff8800",
    "Winter Storm Warning": "#ff00ff",

    "Tornado Watch": "#ffcc00",
    "Severe Thunderstorm Watch": "#ffff00",
    "Flash Flood Watch": "#00ff88",
    "Flood Watch": "#00dd88",

    "Winter Weather Advisory": "#9999ff",
    "Wind Advisory": "#ffaa00",
    "Heat Advisory": "#ff8800",
    "Dense Fog Advisory": "#cccccc"
};

function getAlertStyle(feature) {
    const event = feature.properties.event;
    const color = alertColors[event] || "#ffffff";

    const isWatch = event.includes("Watch");
    const isWarning = event.includes("Warning");
    const isAdvisory = event.includes("Advisory");

    return {
        color: color,
        weight: 2,
        fillColor: color,
        fillOpacity: isWarning ? 0.35 : isAdvisory ? 0.15 : 0.0
    };
}

// Initialize map centered on Lexington
const map = L.map('map').setView([38.0464, -84.4970], 10);

// Beacon Dark Basemap
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
}).addTo(map);

let radarLayer = null;
let alertLayer = null;

// Load Radar (RainViewer v2)
async function loadRadar() {
    try {
        const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
        const data = await res.json();

        // Safely get latest radar frame
        const frames = data.radar?.past || [];
        const lastFrame = frames[frames.length - 1];

        if (!lastFrame) {
            console.warn("No radar frames available");
            return;
        }

        const timestamp = lastFrame.time;

        const radarUrl =
            `https://tilecache.rainviewer.com/v2/radar/${timestamp}/{z}/{x}/{y}/2/1_1.png`;

        if (radarLayer) {
            radarLayer.setUrl(radarUrl);
        } else {
            radarLayer = L.tileLayer(radarUrl, {
                opacity: 0.55,
                zIndex: 200
            }).addTo(map);
        }
    } catch (err) {
        console.error("Radar load error:", err);
    }
}

// Load NWS Alerts
function loadAlerts() {
    fetch("https://api.weather.gov/alerts/active", {
        headers: { "User-Agent": "BeaconDashboard (dtvhub.github.io)" }
    })
    .then(res => res.json())
    .then(data => {
        if (alertLayer) map.removeLayer(alertLayer);

        alertLayer = L.geoJSON(data, {
            style: getAlertStyle,
            onEachFeature: (feature, layer) => {
                const p = feature.properties;
                layer.bindPopup(`
                    <strong>${p.event}</strong><br>
                    <em>${p.headline || ""}</em><br><br>
                    ${p.description || ""}
                `);
            }
        }).addTo(map);
    })
    .catch(err => console.error("Alert load error:", err));
}

// --- LEGEND CONTROL ---
const legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");
    div.style.background = "rgba(0,0,0,0.7)";
    div.style.padding = "10px 14px";
    div.style.borderRadius = "6px";
    div.style.color = "#fff";
    div.style.fontSize = "14px";
    div.style.lineHeight = "18px";
    div.style.maxHeight = "300px";
    div.style.overflowY = "auto";

    div.innerHTML = "<strong>Alert Key</strong><br><br>";

    for (const [event, color] of Object.entries(alertColors)) {
        div.innerHTML += `
            <div style="display:flex;align-items:center;margin-bottom:6px;">
                <span style="
                    width:18px;
                    height:18px;
                    background:${color};
                    border:1px solid #fff;
                    margin-right:8px;
                "></span>
                ${event}
            </div>
        `;
    }

    return div;
};

legend.addTo(map);

// Initial loads
loadRadar();
loadAlerts();

// Auto-refresh radar every 2 minutes
setInterval(loadRadar, 120000);

// Auto-refresh alerts every 60 seconds
setInterval(loadAlerts, 60000);
</script>

</body>
</html>
