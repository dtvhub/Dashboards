<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Alerts Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
    body {
        margin: 0;
        height: 100vh;
        background: #000;
    }
    #map {
        width: 100%;
        height: 100%;
    }

    /* Flashing animation for warnings */
    @keyframes flashWarning {
        0%   { fill-opacity: 0.35; }
        50%  { fill-opacity: 0.05; }
        100% { fill-opacity: 0.35; }
    }

    /* Legend toggle button */
    #legendToggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
        background: #222;
        color: #fff;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        border: 1px solid #555;
    }

    /* Legend box */
    .legend {
        display: none; /* default hidden */
    }
</style>
</head>

<body>

<div id="map"></div>
<div id="legendToggle">Show Key</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// NWS Standard Colors
const alertColors = {
    "Tornado Warning": "#ff0000",
    "Severe Thunderstorm Warning": "#ffcc00",
    "Flash Flood Warning": "#00ff00",
    "Flood Warning": "#00aa00",
    "High Wind Warning": "#ff8800",
    "Winter Storm Warning": "#ff00ff",

    "Tornado Watch": "#ffcc00",
    "Severe Thunderstorm Watch": "#ffff00",
    "Flash Flood Watch": "#00ff88",
    "Flood Watch": "#00dd88",

    "Winter Weather Advisory": "#9999ff",
    "Wind Advisory": "#ffaa00",
    "Heat Advisory": "#ff8800",
    "Dense Fog Advisory": "#cccccc"
};

function getAlertStyle(feature) {
    const event = feature.properties.event;
    const color = alertColors[event] || "#ffffff";

    const isWarning = event.includes("Warning");
    const isAdvisory = event.includes("Advisory");

    return {
        color: color,
        weight: 2,
        fillColor: color,
        fillOpacity: isWarning ? 0.35 : isAdvisory ? 0.15 : 0.0,
        className: isWarning ? "flashing-warning" : ""
    };
}

// Initialize map centered on Lexington
const map = L.map('map').setView([38.0464, -84.4970], 10);

// Beacon Dark Basemap
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
}).addTo(map);

let alertLayer = null;

// Load NWS Alerts
function loadAlerts() {
    fetch("https://api.weather.gov/alerts/active", {
        headers: { "User-Agent": "BeaconDashboard (dtvhub.github.io)" }
    })
    .then(res => res.json())
    .then(data => {
        if (alertLayer) map.removeLayer(alertLayer);

        alertLayer = L.geoJSON(data, {
            style: getAlertStyle,
            onEachFeature: (feature, layer) => {
                const p = feature.properties;

                // Apply flashing animation to warnings
                if (p.event.includes("Warning")) {
                    const el = layer.getElement();
                    if (el) {
                        el.style.animation = "flashWarning 1.8s infinite";
                    }
                }

                layer.bindPopup(`
                    <strong>${p.event}</strong><br>
                    <em>${p.headline || ""}</em><br><br>
                    ${p.description || ""}
                `);
            }
        }).addTo(map);
    })
    .catch(err => console.error("Alert load error:", err));
}

// --- LEGEND CONTROL ---
const legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");
    div.style.background = "rgba(0,0,0,0.7)";
    div.style.padding = "10px 14px";
    div.style.borderRadius = "6px";
    div.style.color = "#fff";
    div.style.fontSize = "14px";
    div.style.lineHeight = "18px";
    div.style.maxHeight = "300px";
    div.style.overflowY = "auto";

    div.innerHTML = "<strong>Alert Key</strong><br><br>";

    for (const [event, color] of Object.entries(alertColors)) {
        div.innerHTML += `
            <div style="display:flex;align-items:center;margin-bottom:6px;">
                <span style="
                    width:18px;
                    height:18px;
                    background:${color};
                    border:1px solid #fff;
                    margin-right:8px;
                "></span>
                ${event}
            </div>
        `;
    }

    return div;
};

legend.addTo(map);

// Toggle legend visibility
const legendToggle = document.getElementById("legendToggle");
legendToggle.addEventListener("click", () => {
    const legendBox = document.querySelector(".legend");
    const isHidden = legendBox.style.display === "none" || legendBox.style.display === "";

    legendBox.style.display = isHidden ? "block" : "none";
    legendToggle.textContent = isHidden ? "Hide Key" : "Show Key";
});

// Initial load
loadAlerts();

// Auto-refresh alerts every 60 seconds
setInterval(loadAlerts, 60000);
</script>

</body>
</html>
