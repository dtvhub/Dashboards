<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #000;
        font-family: Arial, sans-serif;
        color: white;
        height: 100vh;
        display: grid;
        grid-template-rows: 80px 1fr 1fr 1fr;
        gap: 6px;
    }

    .row {
        display: grid;
        gap: 6px;
    }

    .time-row {
        grid-template-columns: repeat(5, 1fr);
        background: #000;
    }

    .time-box {
        background: #111;
        border: 2px solid #222;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 14px;
        text-align: center;
    }

    .panel {
        background: #000;
        border: 2px solid #222;
        position: relative;
        overflow: hidden;
    }

    .panel video, .panel iframe {
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #000;
    }

    .label {
        position: absolute;
        top: 6px;
        left: 6px;
        background: rgba(0,0,0,0.6);
        padding: 4px 8px;
        font-size: 14px;
        border-radius: 4px;
    }

    .fullscreen-btn {
        position: absolute;
        top: 6px;
        right: 6px;
        background: rgba(0,0,0,0.6);
        padding: 4px 8px;
        font-size: 14px;
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
// Load HLS streams
function loadStream(id, url) {
    const video = document.getElementById(id);

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play();
    }
}

// Fullscreen handler
function goFullscreen(elementId) {
    const el = document.getElementById(elementId);
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.msRequestFullscreen) el.msRequestFullscreen();
}

// Clock updater
function updateClocks() {
    const zones = [
        { id: "hst", tz: "Pacific/Honolulu" },
        { id: "pst", tz: "America/Los_Angeles" },
        { id: "mst", tz: "America/Denver" },
        { id: "cst", tz: "America/Chicago" },
        { id: "est", tz: "America/New_York" }
    ];

    zones.forEach(z => {
        document.getElementById(z.id).innerText =
            new Date().toLocaleTimeString("en-US", { timeZone: z.tz });
    });
}

setInterval(updateClocks, 1000);
</script>
</head>

<body>

<!-- TIME ZONES -->
<div class="row time-row">
    <div class="time-box"><strong>Hawaii</strong><div id="hst"></div></div>
    <div class="time-box"><strong>Pacific</strong><div id="pst"></div></div>
    <div class="time-box"><strong>Mountain</strong><div id="mst"></div></div>
    <div class="time-box"><strong>Central</strong><div id="cst"></div></div>
    <div class="time-box"><strong>Eastern</strong><div id="est"></div></div>
</div>

<!-- CNN -->
<div class="panel" id="cnnPanel">
    <div class="label">CNN</div>
    <div class="fullscreen-btn" onclick="goFullscreen('cnnPanel')">⛶</div>
    <video id="cnn" muted controls></video>
</div>

<!-- NICH + WEATHER -->
<div class="row" style="grid-template-columns: 1fr 1fr;">
    <div class="panel" id="nichPanel">
        <div class="label">Nicholasville</div>
        <div class="fullscreen-btn" onclick="goFullscreen('nichPanel')">⛶</div>
        <video id="nich" muted controls></video>
    </div>

    <div class="panel" id="weatherPanel">
        <div class="label">Weather Channel</div>
        <div class="fullscreen-btn" onclick="goFullscreen('weatherPanel')">⛶</div>
        <video id="weather" muted controls></video>
    </div>
</div>

<!-- BEACON -->
<div class="panel" id="beaconPanel">
    <div class="label">Beacon</div>
    <div class="fullscreen-btn" onclick="goFullscreen('beaconPanel')">⛶</div>
    <iframe src="https://dtvhub.github.io/beacon/map/" frameborder="0"></iframe>
</div>

<script>
loadStream("cnn", "https://turnerlive.warnermediacdn.com/hls/live/586495/cnngo/cnn_slate/VIDEO_0_3564000.m3u8");
loadStream("nich", "https://video.hazcams.com/nicholasville-ky-us-001/main_stream.m3u8");
loadStream("weather", "https://twcprod-live.twc-tv.com/v1/manifest/b4d4d63a49309cc5140171fb2e92485c31be1e9e/DSP_6228e4760505741a116f1ba2_twcprod-live/6bf09ce5-366b-463c-b67e-c4b799f73c3f/4.m3u8");

updateClocks();
</script>

</body>
</html>
