<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    /* Top Menu */
    .tab-menu {
        display: flex;
        background: #222;
        border-bottom: 2px solid #444;
    }

    .tab-menu button {
        flex: 1;
        padding: 14px;
        background: #222;
        color: #ccc;
        border: none;
        cursor: pointer;
        font-size: 16px;
        transition: 0.2s;
    }

    .tab-menu button:hover {
        background: #333;
        color: #fff;
    }

    .tab-menu button.active {
        background: #444;
        color: #fff;
        font-weight: bold;
    }

    /* Dashboard Container */
    #dashboardFrame {
        width: 100%;
        height: calc(100vh - 50px);
        border: none;
        background: #000;
    }
</style>

</head>
<body>

<!-- Top Tab Menu -->
<div class="tab-menu">
    <button class="active" onclick="loadDashboard('https://dtvhub.github.io/Dashboards/weather', this)">Dashboard 1</button>
    <button onclick="loadDashboard('dashboards/dashboard2.html', this)">Dashboard 2</button>
    <button onclick="loadDashboard('dashboards/dashboard3.html', this)">Dashboard 3</button>
</div>

<!-- Dashboard Display Area -->
<iframe id="dashboardFrame" src="dashboards/dashboard1.html"></iframe>

<script>
function loadDashboard(url, btn) {
    document.getElementById("dashboardFrame").src = url;

    // Update active tab styling
    document.querySelectorAll(".tab-menu button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
}
</script>

</body>
</html>
